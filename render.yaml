# Render deployment configuration for Flora API Service
databases:
  - name: flora-postgres-db
    plan: free
    region: frankfurt

services:
  - type: web
    name: flora-api-service
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flora-postgres-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: CORS_ORIGIN
        value: https://polina-087.github.io